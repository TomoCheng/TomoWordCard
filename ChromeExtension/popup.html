<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 350px;
      margin: 0;
      padding: 12px;
      background-color: #282c34;
      color: #abb2bf;
    }

    h3 {
      margin: 0;
      color: #abb2bf;
    }

    /* Layout Components */
    .header-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 5px;
      margin-bottom: 12px;
      border-bottom: 2px solid #4CAF50;
    }

    .word-list-container {
      padding: 10px;
      background-color: #282c34;
      border-radius: 6px;
    }

    /* Date Folder System */
    details {
      margin-bottom: 8px;
      background: #21252b;
      border: 1px solid #3e4451;
      border-radius: 4px;
      overflow: hidden;
    }

    summary {
      padding: 8px;
      background: #2c313c;
      color: #abb2bf;
      font-weight: bold;
      cursor: pointer;
      outline: none;
      user-select: none;
    }

    details[open] summary {
      background: #3e4451;
      border-bottom: 1px solid #3e4451;
    }

    /* Word Item Elements */
    .word-item {
      display: flex;
      align-items: center;
      padding: 4px;
      color: #d19a66;
      font-size: 10pt;
      font-weight: bold;
      text-decoration: none;
      border-bottom: 1px solid #3e4451;
      transition: color 0.2s ease;
    }

    .word-item:last-child {
      border-bottom: none;
    }

    .word-item.mastered {
      color: #5c6370;
      font-weight: normal;
      text-decoration: none;
    }

    .word-checkbox {
      margin-right: 8px;
      cursor: pointer;
    }

    .star-input {
      display: none;
    }

    .star-label {
      cursor: pointer;
      font-size: 18px;
      color: #5c6370;
      margin-right: 8px;
      user-select: none;
      transition: color 0.2s, transform 0.2s;
    }

    .star-input:checked + .star-label {
      color: #e5c07b; 
    }

    .star-label:active {
      transform: scale(1.2);
    }

    .word-text {
      flex-grow: 1;
      color: #d19a66;
      font-weight: 500;
      cursor: pointer;
      word-break: break-all;
    }

    .word-text.learned {
      color: #5c6370;
      text-decoration: none;
    }

    /* Form Controls & Inputs */
    input[type="text"] {
      padding: 6px;
      background-color: #21252b;
      color: #abb2bf;
      border: 1px solid #3e4451;
      border-radius: 4px;
    }

    .lang-select {
      padding: 2px 4px;
      background-color: #21252b;
      color: #abb2bf;
      font-size: 11px;
      border: 1px solid #3e4451;
      border-radius: 4px;
      outline: none;
      cursor: pointer;
    }

  .trans-input {
      width: 120px;
      padding: 1px 2px;
      margin-right: 4px;
      background-color: #21252b;
      color: #abb2bf !important;
      font-size: 14px;
      font-weight: bold;
      text-align: right;
      border: 1px solid #3e4451;
      border-radius: 4px;
      outline: none;
      transition: background-color 0.2s;
    }

    .trans-input.is-masked {
      background-color: #3e4451;
      color: transparent !important;
      border-color: #3e4451;
      cursor: pointer;
    }

    .trans-input.is-masked::placeholder {
      color: transparent;
    }

    /* Buttons & Icons */
    .peek-btn {
      padding: 0;
      margin-right: 4px;
      background: none;
      color: #5c6370;
      font-size: 14px;
      border: none;
      cursor: pointer;
      user-select: none;
    }

    .peek-btn:hover {
      color: #abb2bf;
    }

    .delete-btn {
      padding: 0 4px;
      margin-left: 2px;
      background: none;
      color: #e06c75;
      font-size: 14px;
      font-weight: bold;
      border: none;
      cursor: pointer;
    }

    .delete-btn:hover {
      color: #be5046;
    }

    .btn-group {
      display: flex;
      gap: 6px;
      margin-top: 12px;
    }

    .action-btn {
      flex: 1;
      padding: 8px;
      color: white;
      font-size: 12px;
      font-weight: bold;
      text-align: center;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    .btn-export {
      background-color: #48769c;
    }

    .btn-export:hover {
      background-color: #355f81;
    }

    .btn-import {
      background-color: #507e53;
    }

    .btn-import:hover {
      background-color: #3d6340;
    }

    .btn-clear {
      background-color: #5c6370;
    }

    .btn-clear:hover {
      background-color: #4b5263;
    }

    /* Utilities */
    .empty-msg {
      padding: 20px 0;
      color: #5c6370;
      text-align: center;
    }

    .star-icon {
      margin-left: 4px;
      color: #d19a66;
      font-size: 14px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="header-container">
    <h3 id="app-title">TomoWordCard</h3>
    <select id="lang-select" class="lang-select">
      <option value="en" selected>English</option>
      <option value="zh">繁體中文</option>
      <option value="ja">日本語</option>
    </select>
  </div>
  
  <div id="container"></div>

  <div class="btn-group">
    <button id="export-btn" class="action-btn btn-export"></button>
    <button id="import-btn" class="action-btn btn-import"></button>
    <input type="file" id="file-input" accept=".json" style="display: none;">
  </div>
  
  <button id="clear-all" class="action-btn btn-clear" style="width: 100%; margin-top: 6px;"></button>

  <script src="loc.js"></script>
  <script src="popup.js"></script>
</body>
</html>
